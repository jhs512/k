name: Daily Weather (Daejeon)

on:
  schedule:
    # 05:00 UTC = 14:00 KST
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 날씨 조회 및 메일 발송
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: jangka512@gmail.com
        run: python scripts/daily_weather.py
